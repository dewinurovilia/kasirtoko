<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>KASIR TOKO DEFANA</title>

<link
rel="stylesheet"
href="style.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="manifest"
href="manifest.json">

<link
rel="icon"
href="https://cdn-icons-png.flaticon.com/512/263/263142.png">

<meta
name="theme-color"
content="#16a34a">

<meta
name="mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-capable"
content="yes">

</head>

<body>

<!-- =========================
SIDEBAR OVERLAY
========================= -->

<div
class="sidebar-overlay"
onclick="toggleSidebar()">
</div>

<!-- =========================
SIDEBAR
========================= -->

<div class="sidebar">

<h2>🛒 DEFANA</h2>

<div
id="kategoriList"
class="kategori-list">
</div>

<div class="logout-wrap">

<button
class="logout-btn"
onclick="logoutKasir()">

Logout

</button>

</div>

</div>

<!-- =========================
TOPBAR
========================= -->

<div class="topbar">

<button
class="menu-toggle"
onclick="toggleSidebar()">

☰

</button>

<h1>TOKO DEFANA</h1>

</div>

<!-- =========================
SEARCH
========================= -->

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Cari produk..."
oninput="renderProduk()">

<button
class="scan-search-btn"
onclick="scanCariProduk()">

📷

</button>

</div>

<!-- =========================
QR READER
========================= -->

<div id="reader"></div>

<!-- =========================
PRODUK
========================= -->

<div class="main">

<div
id="productList"
class="products-grid">

</div>

</div>

<!-- =========================
FLOAT CART
========================= -->

<div
class="cart-float"
onclick="toggleCart()">

🛒

<span id="cartCount">
0
</span>

</div>

<!-- =========================
CART BOX
========================= -->

<div
class="cart-box"
id="cartBox">

<div class="cart-header">

<h2>Keranjang</h2>

<button
class="close-btn"
onclick="toggleCart()">

✕

</button>

</div>

<!-- FORM -->

<input
type="text"
id="namaPemesan"
placeholder="👤 Nama Kasir">

<select
id="pembayaran"
onchange="toggleQR()">

<option value="COD">
💵 COD
</option>

<option value="Transfer">
🏦 Transfer
</option>

</select>

<!-- QR -->

<div id="qrBox">

<p class="qr-title">
Scan QR Pembayaran
</p>

<img src="img/barcode.png">

</div>

<!-- CART -->

<div id="cartItems"></div>

<div id="cartTotal"></div>

<!-- PASSWORD STRUK -->

<div
id="passwordStrukBox"
style="display:none;">

<input
type="password"
id="passwordStruk"
placeholder="🔒 Password Struk">

<button
id="btnUnlock"
type="button"
onclick="cekPasswordStruk()"
class="mini-cart-btn">

🔓 Unlock

</button>

</div>

<!-- BUTTON -->

<button
id="btnStruk"
class="checkout-btn"
onclick="bukaPopupBayar()">
🖨 Cetak Struk

</button>

<button
class="reset-btn"
onclick="resetCart()">

🗑 Reset Keranjang

</button>

</div>

<!-- =========================
POPUP PRODUK
========================= -->

<div
class="popup"
id="popupBox">

<div class="popup-content">

<h2 id="popupNama">
Produk
</h2>

<p id="popupHarga">
Rp 0
</p>

<div class="popup-qty">

<button onclick="popupKurang()">
−
</button>

<input
type="number"
id="popupQty"
value="1"
min="1">

<button onclick="popupTambah()">
+
</button>

</div>

<button
class="popup-btn"
onclick="confirmAddCart()">

🛒 Tambahkan

</button>

<button
class="popup-close"
onclick="closePopup()">

Tutup

</button>

</div>

</div>

<!-- =========================
POPUP BAYAR
========================= -->

<div
id="popupBayar"
class="popup">

<div class="popup-content">

<h2>Pembayaran</h2>

<p id="totalBayarText">
Rp 0
</p>

<input
type="tel"
inputmode="numeric"
id="uangBayar"
placeholder="Masukkan uang pembeli"
oninput="formatInputUang(this)">

<div class="popup-actions">

<button
class="popup-btn"
onclick="prosesCetakStruk()">

Cetak

</button>

<button
class="popup-close"
onclick="tutupPopupBayar()">

Batal

</button>

</div>

</div>

</div>

<!-- =========================
POPUP CATATAN
========================= -->

<div
id="popupCatatan"
class="popup">

<div class="popup-content">

<h2>🔒 Password Catatan</h2>

<input
type="password"
id="passwordCatatanInput"
placeholder="Masukkan Password">

<p id="catatanInfo"></p>

<div class="popup-actions">

<button
class="popup-btn"
onclick="cekPasswordCatatan()">

Masuk

</button>

<button
class="popup-close"
onclick="tutupPopupCatatan()">

Batal

</button>

</div>

</div>

</div>

<!-- =========================
POPUP ADMIN
========================= -->

<div
id="popupAdmin"
class="popup">

<div class="popup-content">

<h2>🔒 Login Admin</h2>

<input
type="email"
id="adminEmail"
placeholder="Email Admin">

<input
type="password"
id="adminPassword"
placeholder="Password Admin">

<div class="popup-actions">

<button
class="popup-btn"
onclick="loginAdminPopup()">

Masuk

</button>

<button
class="popup-close"
onclick="tutupPopupAdmin()">

Batal

</button>

</div>

<p id="loginInfo"></p>

</div>

</div>

<!-- =========================
LOGIN KASIR
========================= -->

<div
class="login-overlay"
id="loginOverlay">

<div class="login-box">

<h2>Login Kasir</h2>

<input
type="text"
id="loginNama"
placeholder="Nama Kasir">

<input
type="email"
id="loginEmail"
placeholder="Email">

<input
type="password"
id="loginPassword"
placeholder="Password">

<button onclick="loginKasir()">

Masuk

</button>

</div>

</div>

<!-- =========================
TOAST
========================= -->

<div
id="toast"
class="toast">

<span id="toastText"></span>

</div>

<!-- =========================
LOADING
========================= -->

<div
class="loading-box"
id="loadingBox">

<div class="spinner"></div>

<p id="loadingText">
Memproses...
</p>

</div>

<!-- =========================
BOTTOM MENU
========================= -->

<div class="bottom-menu">

<button onclick="window.scrollTo({
top:0,
behavior:'smooth'
})">

<span>🏠</span>
Home

</button>

<button onclick="window.location.href='rekap.html'">

<span>📋</span>
Rekap

</button>

<button onclick="bukaCatatanPopup()">

<span>📝</span>
Catatan

</button>

<button onclick="bukaPopupAdmin()">

<span>⚙️</span>
Admin

</button>

<button
onclick="toggleCart()"
class="menu-cart">

<span>🛒</span>

Checkout

<div id="bottomCartCount">
0
</div>

</button>

</div>

<!-- =========================
ADMIN BUTTON
========================= -->

<a
href="admin/admin.html"
class="admin-link">

⚙️ Admin

</a>

<!-- =========================
QRCODE
========================= -->

<script src="https://unpkg.com/html5-qrcode"></script>

<!-- =========================
FIREBASE
========================= -->

<script
type="module"
src="firebase.js">
</script>

<!-- =========================
POPUP JS
========================= -->

<script src="popup.js"></script>

<!-- =========================
AUTH JS
========================= -->

<script src="auth.js"></script>

<!-- =========================
MAIN SCRIPT
========================= -->

<script
type="module"
src="script.js">
</script>

<!-- =========================
SERVICE WORKER
========================= -->

<script>

if("serviceWorker" in navigator){

navigator
.serviceWorker
.register("sw.js")

.then(()=>{

console.log(
"Service Worker aktif"
);

});

}

</script>

</body>
</html>
